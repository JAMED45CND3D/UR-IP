<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>UR-IP · Camera Scanner</title>
<script src="uriplib.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#03030a;color:#ffe898;font-family:'Courier New',monospace;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;flex-shrink:0;background:rgba(3,3,10,.95);border-bottom:1px solid #c8a84022;z-index:100}
.logo{font-size:13px;letter-spacing:4px;color:#c8a840;font-weight:bold}
.ver{font-size:7px;letter-spacing:2px;color:#c8a84066;border:1px solid #c8a84033;padding:2px 6px}
#vf-wrap{flex:1;position:relative;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
#cam-video{width:100%;height:100%;object-fit:cover;display:block}
#vf-overlay{position:absolute;inset:0;pointer-events:none}
#panel{flex-shrink:0;background:#080610;border-top:1px solid #c8a84022;padding:10px 16px 16px;z-index:50}
#status-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;min-height:28px}
#status-dot{width:8px;height:8px;border-radius:50%;background:#c8a840;animation:pulse 1.4s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
#status-dot.ok{background:#47ff8a;animation:none}
#status-dot.er{background:#ff476a;animation:none}
#status-dot.idle{background:#c8a84044;animation:none}
#status-txt{font-size:9px;letter-spacing:2px;color:#c8a84099;flex:1}
#result-box{display:none;background:#060410;border:1px solid #c8a840;padding:12px;margin-bottom:10px}
#result-id{font-size:10px;color:#c8a840;letter-spacing:1px;word-break:break-all;margin-bottom:4px}
#result-name{font-size:16px;font-weight:bold;color:#ffe898;margin:6px 0 2px}
#result-meta{font-size:8px;color:#c8a84066;letter-spacing:1px}
#result-url{font-size:9px;color:#47ffe0;margin-top:4px}
.btn-row{display:flex;gap:6px}
.btn{flex:1;padding:11px 8px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;cursor:pointer;border:1px solid;text-transform:uppercase;background:transparent;transition:all .15s;text-align:center}
.btn-main{border-color:#c8a840;color:#c8a840}
.btn-main:active{background:#c8a84022}
.btn-main.running{border-color:#ff476a;color:#ff476a}
.btn-sec{border-color:#c8a84033;color:#c8a84066}
.btn-sec:active{background:#c8a84011}
#dbg{font-size:7px;color:#c8a84033;letter-spacing:1px;margin-top:6px;height:14px;overflow:hidden}
</style>
</head>
<body>

<nav>
  <div class="logo">UR-IP</div>
  <div class="ver">CAMERA SCANNER · v4.0</div>
</nav>

<div id="vf-wrap">
  <video id="cam-video" autoplay playsinline muted></video>
  <canvas id="vf-overlay"></canvas>
</div>

<div id="panel">
  <div id="status-bar">
    <div id="status-dot" class="idle"></div>
    <div id="status-txt">Tekan START untuk aktifkan kamera</div>
  </div>

  <div id="result-box">
    <div id="result-id">—</div>
    <div id="result-name">—</div>
    <div id="result-meta">—</div>
    <div id="result-url"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-main" id="btn-start" onclick="toggleCam()">&#9654; START</button>
    <button class="btn btn-sec" onclick="manualSnap()">&#9711; SNAP</button>
    <button class="btn btn-sec" onclick="clearResult()">&#10005;</button>
  </div>
  <div id="dbg"></div>
</div>

<script>
var camStream=null,camActive=false,scanLoop=false,overlayAF=null;
var lastScan=0,scanDebounce=1200,ringAngle=0;
var snapCanvas=document.createElement('canvas');
var snapCtx=snapCanvas.getContext('2d');

function dbFind(id){try{return JSON.parse(localStorage.getItem('urip_db')||'{}')[id]||null;}catch(e){return null;}}

function setStatus(type,txt){
  var dot=document.getElementById('status-dot');
  dot.className=type;
  document.getElementById('status-txt').textContent=txt;
}
function dbg(txt){document.getElementById('dbg').textContent=txt;}

function toggleCam(){if(camActive)stopCam();else startCam();}

function startCam(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    setStatus('er','Kamera tidak didukung — butuh HTTPS');return;
  }
  setStatus('','Meminta akses kamera...');
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:1280}}
  }).then(function(stream){
    camStream=stream;camActive=true;
    var vid=document.getElementById('cam-video');
    vid.srcObject=stream;
    vid.onloadedmetadata=function(){
      setStatus('','Kamera aktif · scanning otomatis...');
      var btn=document.getElementById('btn-start');
      btn.textContent='&#9646; STOP';btn.classList.add('running');
      startOverlayLoop();startScanLoop();
    };
  }).catch(function(err){
    setStatus('er','Kamera ditolak: '+err.message);
  });
}

function stopCam(){
  if(camStream)camStream.getTracks().forEach(function(t){t.stop();});
  camStream=null;camActive=false;scanLoop=false;
  if(overlayAF)cancelAnimationFrame(overlayAF);overlayAF=null;
  var vid=document.getElementById('cam-video');vid.srcObject=null;
  var btn=document.getElementById('btn-start');
  btn.textContent='&#9654; START';btn.classList.remove('running');
  setStatus('idle','Kamera dimatikan');
  var ov=document.getElementById('vf-overlay');
  ov.getContext('2d').clearRect(0,0,ov.width,ov.height);
}

function startOverlayLoop(){
  var ov=document.getElementById('vf-overlay');
  var vfw=document.getElementById('vf-wrap');
  function frame(){
    if(!camActive)return;
    var W=vfw.offsetWidth,H=vfw.offsetHeight;
    if(ov.width!==W||ov.height!==H){ov.width=W;ov.height=H;}
    var ctx=ov.getContext('2d');
    ctx.clearRect(0,0,W,H);
    var cx=W/2,cy=H/2,r=Math.min(W,H)*0.40;

    // Vignette
    var vg=ctx.createRadialGradient(cx,cy,r*0.85,cx,cy,r*1.4);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.55)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

    // Ring
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(200,168,64,0.5)';ctx.lineWidth=1.5;ctx.stroke();

    // Corner brackets
    var cs=20;
    [[cx-r,cy-r,1,1],[cx+r,cy-r,-1,1],[cx-r,cy+r,1,-1],[cx+r,cy+r,-1,-1]].forEach(function(q){
      ctx.beginPath();
      ctx.moveTo(q[0],q[1]);ctx.lineTo(q[0]+q[2]*cs,q[1]);
      ctx.moveTo(q[0],q[1]);ctx.lineTo(q[0],q[1]+q[3]*cs);
      ctx.strokeStyle='rgba(200,168,64,0.85)';ctx.lineWidth=1.5;ctx.stroke();
    });

    // Rotating scan sweep
    ringAngle+=0.04;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(ringAngle);
    var sg=ctx.createLinearGradient(0,0,r,0);
    sg.addColorStop(0,'rgba(200,168,64,0.6)');sg.addColorStop(1,'rgba(200,168,64,0)');
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(r,0);
    ctx.strokeStyle=sg;ctx.lineWidth=1;ctx.stroke();
    ctx.restore();

    // Center dot
    ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);
    ctx.strokeStyle='rgba(200,168,64,0.4)';ctx.lineWidth=1;ctx.stroke();

    overlayAF=requestAnimationFrame(frame);
  }
  frame();
}

function startScanLoop(){
  scanLoop=true;
  function tick(){
    if(!camActive||!scanLoop)return;
    var now=Date.now();
    if(now-lastScan>=scanDebounce){
      lastScan=now;
      doScan();
    }
    requestAnimationFrame(tick);
  }
  tick();
}

function doScan(){
  var vid=document.getElementById('cam-video');
  if(!vid.videoWidth||vid.readyState<2)return;
  var vW=vid.videoWidth,vH=vid.videoHeight;
  var sz=Math.min(vW,vH);
  var ox=(vW-sz)/2,oy=(vH-sz)/2;
  snapCanvas.width=sz;snapCanvas.height=sz;
  snapCtx.drawImage(vid,ox,oy,sz,sz,0,0,sz,sz);
  dbg('scanning '+sz+'x'+sz+' @ '+new Date().toLocaleTimeString());
  var res=URIP.scan(snapCanvas,'auto');
  if(res.ok&&res.text)handleResult(res);
}

function manualSnap(){
  if(!camActive){setStatus('er','Kamera belum aktif');return;}
  setStatus('','Scanning...');
  lastScan=0;doScan();
}

function handleResult(res){
  setStatus('ok','Decoded · '+res.scannedMode+' · '+res.payLen+'B');
  var box=document.getElementById('result-box');
  box.style.display='block';
  document.getElementById('result-id').textContent=res.text;
  var entry=dbFind(res.text);
  if(entry){
    document.getElementById('result-name').textContent=entry.name;
    document.getElementById('result-meta').textContent=entry.type+' · '+entry.created;
    document.getElementById('result-url').innerHTML=entry.url?
      '<a href="'+entry.url+'" target="_blank" style="color:#47ffe0">'+entry.url+'</a>':'';
  }else{
    document.getElementById('result-name').textContent='(tidak ada di database lokal)';
    document.getElementById('result-meta').textContent='ID valid — belum terdaftar di device ini';
    document.getElementById('result-url').innerHTML='';
  }
  // Pause 3s after hit
  scanDebounce=3000;
  setTimeout(function(){scanDebounce=1200;},3000);
  // Flash overlay
  var ov=document.getElementById('vf-overlay'),ctx=ov.getContext('2d');
  ctx.fillStyle='rgba(61,255,122,0.15)';ctx.fillRect(0,0,ov.width,ov.height);
  setTimeout(function(){ctx.clearRect(0,0,ov.width,ov.height);},250);
}

function clearResult(){
  document.getElementById('result-box').style.display='none';
  if(camActive)setStatus('','Scanning...');
  else setStatus('idle','Tekan START untuk aktifkan kamera');
}

// Init
(function(){
  if(typeof URIP==='undefined'){setStatus('er','ERROR: uriplib.js tidak ter-load!');return;}
  setStatus('idle','Tekan START · uriplib v'+URIP.VERSION+' ready');
})();
</script>
</body>
</html>
